; ============================================================
; Claude Monitor CYD - PlatformIO Configuration
; Board: ESP32-2432S028 "Cheap Yellow Display"
; ============================================================

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -D USER_SETUP_LOADED
    -D DISABLE_ALL_LIBRARY_WARNINGS
    -I include
    -include User_Setup.h
    -O2

; Exclude ARM NEON/Helium assembly files (not compatible with Xtensa/ESP32)
lib_ignore =
build_unflags =
lib_archive = false

lib_deps =
    lvgl/lvgl@~9.2.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

monitor_filters = direct

[env:cyd_ota]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -D USER_SETUP_LOADED
    -D DISABLE_ALL_LIBRARY_WARNINGS
    -I include
    -include User_Setup.h
    -O2
lib_archive = false
lib_deps =
    lvgl/lvgl@~9.2.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
upload_protocol = espota
upload_port = claude-monitor.local
